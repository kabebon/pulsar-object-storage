<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Warm coffee background square with hard pixel corners -->
  <rect width="32" height="32" fill="#b06a2c"/>
  <!-- Dark border (hard shadow, pixel style) -->
  <rect x="0" y="0" width="32" height="32" fill="none" stroke="#2b1d12" stroke-width="2"/>
  <!-- Stylised cloud / storage icon — three stacked horizontal bars (pixel art) -->
  <!-- Bar 1 (top) -->
  <rect x="7" y="9" width="18" height="4" rx="2" fill="#fffaf2"/>
  <!-- Bar 2 (mid) -->
  <rect x="9" y="15" width="14" height="4" rx="2" fill="#fffaf2" opacity=".75"/>
  <!-- Bar 3 (bottom) -->
  <rect x="11" y="21" width="10" height="3" rx="1.5" fill="#fffaf2" opacity=".5"/>
</svg>
