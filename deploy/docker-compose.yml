# Pulsar — local & production-ish docker-compose.
# Bring the whole stack up with: docker compose up -d
#
# Services:
#   pulsar    application
#   postgres  relational store
#   redis     sessions, rate-limit, cache
#   minio     S3-compatible object storage (+ console)
#   mailpit   SMTP catch-all + web UI on :8025
#   caddy     reverse proxy with automatic HTTPS in front of the app

name: pulsar

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pulsar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ChangeMe123!}
      POSTGRES_DB: pulsar
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulsar -d pulsar"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-ChangeMe123!}"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-ChangeMe123!}
    # Expose the S3 API (:9000) so browsers can PUT presigned uploads directly,
    # and the admin console (:9001). Local dev only; behind Caddy (prod profile)
    # these are not published because traffic flows through the reverse proxy.
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Provision the default bucket once MinIO is up and apply the CORS policy
  # the browser uploader needs (presigned PUT from the app origin to the
  # storage origin is cross-origin; without CORS the browser blocks it with
  # "failed to fetch"). The init script builds the CORS XML at runtime from
  # CORS_ALLOWED_ORIGINS so the same image works for dev (localhost) and prod
  # (real domains) — see deploy/minio-init.sh.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      # `mc` reads aliases from MC_HOST_<name> env, so no `mc alias set` needed.
      MC_HOST_local: http://${MINIO_ROOT_USER:-admin}:${MINIO_ROOT_PASSWORD:-ChangeMe123!}@minio:9000
      MINIO_BUCKET: pulsar
      # Origins allowed to perform cross-origin PUT/GET against the bucket.
      # Defaults to the local dev origins; override in .env for prod, e.g.
      #   CORS_ALLOWED_ORIGINS=https://app.example.com
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8080 http://127.0.0.1:8080}
    volumes:
      - ./minio-init.sh:/minio-init.sh:ro
    entrypoint: ["/bin/sh", "/minio-init.sh"]

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

  pulsar:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    env_file:
      - ../.env
    environment:
      # These MUST be overridden here because they use Docker service hostnames,
      # not the values from .env (which point to localhost for local dev).
      HTTP_ADDR: ":8080"
      DATABASE_URL: ""
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: "${POSTGRES_USER:-pulsar}"
      DB_PASSWORD: "${POSTGRES_PASSWORD:-ChangeMe123!}"
      DB_NAME: pulsar
      DB_SSLMODE: disable
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: "${REDIS_PASSWORD:-ChangeMe123!}"
      S3_ENDPOINT: http://minio:9000
      # The host BROWSERS use to reach the bucket for presigned uploads/downloads.
      # S3_ENDPOINT above is the Docker-internal origin the app talks to; this one
      # is what gets baked into presigned URLs. For local dev it must point at the
      # host-exposed port (see minio.ports), otherwise the browser is handed a URL
      # like http://minio:9000/... which it cannot resolve → "failed to fetch".
      # Override via .env when deploying behind a real CDN.
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-http://localhost:9000}
      S3_ACCESS_KEY: "${MINIO_ROOT_USER:-admin}"
      S3_SECRET_KEY: "${MINIO_ROOT_PASSWORD:-ChangeMe123!}"
      S3_BUCKET: pulsar
      S3_REGION: us-east-1
      S3_USE_PATH_STYLE: "true"
      MIGRATIONS_DIR: /migrations
      # Trust the Caddy reverse proxy so X-Forwarded-For/X-Real-IP are honoured.
      # Default covers Docker networks; override via .env if yours differs.
      TRUSTED_PROXIES: ${TRUSTED_PROXIES:-172.16.0.0/12}
      # Everything else (APP_ENV, PUBLIC_BASE_URL, JWT_SECRET, SMTP_*, SESSION_*,
      # CSRF_*, YOOKASSA_*, CRYPTOBOT_*, CDN_*) comes from env_file: ../.env
    ports:
      - "127.0.0.1:8080:8080"

  caddy:
    image: caddy:2-alpine
    profiles: ["prod"]   # opt-in: docker compose --profile prod up
    restart: unless-stopped
    depends_on:
      - pulsar
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config
    environment:
      # Override domain via PULSAR_HOST in .env (root of repo)
      PULSAR_HOST: ${PULSAR_HOST:-pulsar.my.id}

volumes:
  pgdata:
  redisdata:
  miniodata:
  caddydata:
  caddyconfig:
